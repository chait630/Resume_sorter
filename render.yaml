services:
  - type: web
    name: resume-sorter
    env: node
    plan: free
    buildCommand: npm install && npm install --prefix client && npm run build --prefix client && npm install --prefix server
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
